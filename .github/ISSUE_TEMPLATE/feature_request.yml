name: Feature request
description: Suggest a focused improvement for Live Clip Factory
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Ingestion
        - Transcription
        - AI clip selection
        - Review UI
        - Rendering
        - Captions
        - Exports
        - Documentation
        - Security
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Link examples, edge cases, or prior art if useful.
    validations:
      required: false
